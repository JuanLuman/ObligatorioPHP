<!--2. Crear el Formulario de Login (login.html)
Debes crear un formulario HTML que capture el email y la contraseña.
Método: Siempre utiliza POST para el envío de credenciales, ya que viajan de 
forma "oculta" y no quedan registradas en la URL del navegador
.
Campos: Utiliza <input type="email"> para validación básica de formato y 
<input type="password"> para ocultar los caracteres ingresados-->

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Login </title>
</head>
<body>
    <fieldset>
        <legend align="center">Login</legend>
        <table align="center">
            <tr><td>
                <form action="validacion_login.php" method="POST"> 
                    <div>
                        Email:
                        <p><input type="email" id="email" name="email" placeholder="Ingrese el email" required></p>
                    </div>
                    <div>
                        Contraseña:
                        <p><input type="password" id="password" name="password" placeholder="Minimo 8 caracteres" required></p>
                    </div>

                    <!-- checkbox para recordar el email -->
                    <div>
                        <input type="checkbox" id="recordar" name="recordar">
                        Recordar mi email
                        <br></br>
                    </div>
                    <input type="submit" name="Ingresar" value="Ingresar">
                </form>
            </td></tr>
        </table>
    
    </fieldset>
</body>
</html>
